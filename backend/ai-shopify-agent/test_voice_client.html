<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Agent Test Client</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --muted:    #8b949e;
      --text:     #e6edf3;
      --blue:     #388bfd;
      --green:    #3fb950;
      --red:      #f85149;
      --purple:   #bc8cff;
      --yellow:   #d29922;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
      gap: 24px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.3px;
    }
    h1 span { color: var(--muted); font-weight: 400; font-size: 0.85rem; margin-left: 8px; }

    /* ── Layout ─────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 16px;
      width: 100%;
      max-width: 860px;
    }
    @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }

    /* ── Card ───────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
    }
    .card + .card { margin-top: 12px; }
    .label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Inputs ─────────────────────────────────────────────── */
    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.82rem;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--blue); }
    .field { margin-bottom: 10px; }
    .field > small { display: block; font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }

    /* ── Buttons ────────────────────────────────────────────── */
    button {
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.05);
      color: var(--text);
      font-size: 0.82rem;
      padding: 7px 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    button:hover:not(:disabled) { background: rgba(255,255,255,.1); border-color: #58a6ff; }
    button:disabled { opacity: .3; cursor: not-allowed; }
    button.primary { background: rgba(56,139,253,.18); border-color: var(--blue); color: #79c0ff; }
    button.primary:hover:not(:disabled) { background: rgba(56,139,253,.32); }
    button.danger  { background: rgba(248,81,73,.15); border-color: var(--red); color: #ff7b72; }
    button.danger:hover:not(:disabled)  { background: rgba(248,81,73,.28); }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Status pill ────────────────────────────────────────── */
    #status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
      margin-bottom: 12px;
    }
    #status::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .s-idle       { background: rgba(139,148,158,.12); color: var(--muted); }
    .s-connecting { background: rgba(210,153,34,.15);  color: var(--yellow); }
    .s-ready      { background: rgba(63,185,80,.15);   color: var(--green); }
    .s-recording  { background: rgba(248,81,73,.18);   color: var(--red); animation: pulse 1s infinite; }
    .s-thinking   { background: rgba(188,140,255,.15); color: var(--purple); }
    .s-speaking   { background: rgba(56,139,253,.15);  color: #79c0ff; }
    .s-error      { background: rgba(248,81,73,.18);   color: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* ── Mic button ─────────────────────────────────────────── */
    .mic-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; margin: 16px 0 12px; }
    #micBtn {
      width: 68px; height: 68px;
      border-radius: 50%;
      font-size: 26px;
      border: 2px solid var(--border);
      background: rgba(255,255,255,.05);
      transition: all 0.2s;
      touch-action: none;
    }
    #micBtn.active {
      background: rgba(248,81,73,.25);
      border-color: var(--red);
      box-shadow: 0 0 20px rgba(248,81,73,.4);
    }
    .mic-hint { font-size: 0.72rem; color: var(--muted); text-align: center; }

    /* ── Latency row ────────────────────────────────────────── */
    .lat-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .lat {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 6px;
      text-align: center;
    }
    .lat-name { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    .lat-val  { font-size: 0.95rem; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }
    .lat-val.good { color: var(--green); }
    .lat-val.slow { color: var(--red); }
    .lat-val.na   { color: var(--muted); }

    /* ── Audio progress ─────────────────────────────────────── */
    .progress-wrap { margin-bottom: 12px; }
    .progress-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }
    .progress-track { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-fill  { height: 100%; width: 0%; background: var(--blue); border-radius: 99px; transition: width .1s linear; }

    /* ── Log ────────────────────────────────────────────────── */
    #log {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      max-height: 130px;
      overflow-y: auto;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      scrollbar-width: thin;
    }
    .log-line { line-height: 1.7; white-space: pre-wrap; word-break: break-all; }
    .log-line.ok  { color: var(--green); }
    .log-line.err { color: var(--red); }
    .log-line.inf { color: #79c0ff; }

    /* ── Conversation ───────────────────────────────────────── */
    #conv {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 520px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .msg {
      border-radius: 10px;
      padding: 10px 13px;
      font-size: 0.83rem;
      line-height: 1.55;
      max-width: 95%;
    }
    .msg-role { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .msg.user  { background: rgba(188,140,255,.12); border: 1px solid rgba(188,140,255,.2); align-self: flex-end; }
    .msg.user .msg-role  { color: var(--purple); }
    .msg.agent { background: rgba(56,139,253,.1);  border: 1px solid rgba(56,139,253,.2); }
    .msg.agent .msg-role { color: #79c0ff; }
    .msg.sys   { background: transparent; color: var(--muted); font-size: 0.72rem; font-style: italic; align-self: center; border: none; padding: 2px 0; }
    .cursor { display: inline-block; width: 6px; height: 12px; background: #79c0ff; border-radius: 2px; margin-left: 2px; vertical-align: middle; animation: pulse .7s infinite; }
  </style>
</head>
<body>

<h1>🤖 Voice Agent <span>dev test client · ws://localhost:8000</span></h1>

<div class="grid">

  <!-- LEFT COLUMN -->
  <div>
    <!-- Connection -->
    <div class="card">
      <div class="label">Connection</div>
      <div class="field">
        <small>Server URL</small>
        <input type="text" id="serverUrl" value="ws://localhost:8000" />
      </div>
      <div class="field">
        <small>Session ID <em style="color:var(--muted)">(blank = auto)</em></small>
        <input type="text" id="sessionId" placeholder="auto-generated" />
      </div>
      <div id="status" class="s-idle">Not connected</div>
      <div class="btn-row">
        <button class="primary" id="btnConnect">Connect</button>
        <button id="btnDisconnect" disabled>Disconnect</button>
      </div>
    </div>

    <!-- Push-to-talk -->
    <div class="card">
      <div class="label">Push-to-talk</div>
      <div class="mic-wrap">
        <button id="micBtn" disabled>🎤</button>
        <span class="mic-hint" id="micHint">Connect first</span>
      </div>
      <div class="btn-row" style="justify-content:center">
        <button id="btnCancel" class="danger" disabled>⏹ Cancel</button>
      </div>
    </div>

    <!-- Latency -->
    <div class="card">
      <div class="label">Pipeline Latency</div>
      <div class="lat-row">
        <div class="lat"><div class="lat-name">STT</div><div class="lat-val na" id="lSTT">—</div></div>
        <div class="lat"><div class="lat-name">LLM</div><div class="lat-val na" id="lLLM">—</div></div>
        <div class="lat"><div class="lat-name">TTS</div><div class="lat-val na" id="lTTS">—</div></div>
        <div class="lat"><div class="lat-name">Total</div><div class="lat-val na" id="lTotal">—</div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label" id="progressLabel">Audio playback</div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <div id="log"></div>
    </div>
  </div>

  <!-- RIGHT COLUMN: Conversation -->
  <div class="card" style="display:flex;flex-direction:column;">
    <div class="label">Conversation</div>
    <div id="conv"></div>
  </div>

</div>

<script>
'use strict';

// ─── State ────────────────────────────────────────────────────────────────
let ws             = null;
let recorder       = null;
let isRecording    = false;
let isCancelled    = false;

// Audio playback
let audioCtx       = null;
let audioQueue     = [];          // ArrayBuffer[]
let draining       = false;
let scheduleAt     = 0;           // AudioContext time for next chunk
let activeSources  = [];
let totalChunks    = 0;
let playedChunks   = 0;

// Timing
let t_eos          = 0;   // END_OF_SPEECH sent
let t_transcript   = 0;   // TRANSCRIPT received
let t_firstToken   = 0;   // first AGENT_STREAM received
let t_firstAudio   = 0;   // first audio bytes received
let gotFirstToken  = false;
let gotFirstAudio  = false;

// Streaming agent bubble
let agentBubble    = null;
let agentText      = '';

// ─── DOM refs ─────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const statusEl     = $('status');
const micBtn       = $('micBtn');
const micHint      = $('micHint');
const btnConnect   = $('btnConnect');
const btnDisconnect= $('btnDisconnect');
const btnCancel    = $('btnCancel');
const conv         = $('conv');
const logEl        = $('log');
const lSTT         = $('lSTT');
const lLLM         = $('lLLM');
const lTTS         = $('lTTS');
const lTotal       = $('lTotal');
const progressFill = $('progressFill');
const progressLabel= $('progressLabel');

// ─── Utilities ────────────────────────────────────────────────────────────
function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className   = cls;
}

function log(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'log-line' + (type ? ' ' + type : '');
  const ts = new Date().toLocaleTimeString('en', { hour12: false, fractionalSecondDigits: 1 });
  el.textContent = `[${ts}] ${msg}`;
  logEl.appendChild(el);
  logEl.scrollTop = logEl.scrollHeight;
}

function ms(val) {
  if (!val || val < 0) return '—';
  return val < 1000 ? `${Math.round(val)}ms` : `${(val / 1000).toFixed(2)}s`;
}

function setLat(el, val) {
  el.textContent = ms(val);
  el.className = 'lat-val' + (val <= 0 ? ' na' : val < 2000 ? ' good' : ' slow');
}

function resetLatency() {
  [lSTT, lLLM, lTTS, lTotal].forEach(el => { el.textContent = '—'; el.className = 'lat-val na'; });
  progressFill.style.width = '0%';
  progressLabel.textContent = 'Audio playback';
}

function sysMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg sys';
  el.textContent = text;
  conv.appendChild(el);
  conv.scrollTop = conv.scrollHeight;
}

function userMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `<div class="msg-role">🎤 You</div><div>${escHtml(text)}</div>`;
  conv.appendChild(el);
  conv.scrollTop = conv.scrollHeight;
}

function startAgentBubble() {
  agentText = '';
  agentBubble = document.createElement('div');
  agentBubble.className = 'msg agent';
  agentBubble.innerHTML = `<div class="msg-role">🤖 Agent</div><span id="agentBody"></span><span class="cursor" id="agentCursor"></span>`;
  conv.appendChild(agentBubble);
  conv.scrollTop = conv.scrollHeight;
}

function appendAgentText(chunk) {
  agentText += chunk;
  const body = document.getElementById('agentBody');
  if (body) body.textContent = agentText;
  conv.scrollTop = conv.scrollHeight;
}

function finalizeAgentBubble() {
  const cursor = document.getElementById('agentCursor');
  if (cursor) cursor.remove();
  agentBubble = null;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Audio context ────────────────────────────────────────────────────────
async function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume().catch(() => {});
  return audioCtx;
}

function resetAudio(closeCtx = false) {
  draining = false;
  scheduleAt = 0;
  audioQueue = [];
  totalChunks = 0;
  playedChunks = 0;
  gotFirstAudio = false;
  activeSources.forEach(s => { try { s.onended = null; s.stop(); s.disconnect(); } catch {} });
  activeSources = [];
  progressFill.style.width = '0%';
  progressLabel.textContent = 'Audio playback';
  if (closeCtx && audioCtx) { audioCtx.close().catch(() => {}); audioCtx = null; }
}

function enqueueAudio(buf) {
  audioQueue.push(buf);
  totalChunks++;
  drainAudio();
}

async function drainAudio() {
  if (draining) return;
  draining = true;
  try {
    const ctx = await getAudioCtx();
    if (!scheduleAt || scheduleAt < ctx.currentTime) scheduleAt = ctx.currentTime + 0.02;

    while (audioQueue.length > 0) {
      const raw = audioQueue.shift();
      let decoded;
      try {
        decoded = await ctx.decodeAudioData(raw.slice(0));
      } catch {
        // Try wrapping as PCM WAV fallback
        try { decoded = await ctx.decodeAudioData(pcmToWav(raw)); } catch { continue; }
      }

      const src = ctx.createBufferSource();
      src.buffer = decoded;
      src.connect(ctx.destination);
      activeSources.push(src);

      const start = scheduleAt;
      scheduleAt = Math.max(ctx.currentTime, start + decoded.duration - 0.04);

      src.onended = () => {
        activeSources = activeSources.filter(s => s !== src);
        playedChunks++;
        const pct = totalChunks > 0 ? (playedChunks / Math.max(totalChunks, playedChunks)) * 100 : 0;
        progressFill.style.width = `${Math.min(100, pct)}%`;
        if (audioQueue.length === 0 && activeSources.length === 0) {
          progressLabel.textContent = 'Playback complete';
          progressFill.style.width = '100%';
        }
      };

      try { src.start(start); setStatus('Agent speaking…', 's-speaking'); } catch {
        activeSources = activeSources.filter(s => s !== src);
      }
      await new Promise(r => setTimeout(r, 0));
    }
  } finally {
    draining = false;
    if (audioQueue.length > 0) drainAudio();
  }
}

function pcmToWav(pcm) {
  const sr = 22050, ch = 1, bps = 16, dl = pcm.byteLength;
  const buf = new ArrayBuffer(44 + dl);
  const v = new DataView(buf);
  const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4, 36+dl, true); w(8,'WAVE');
  w(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true);
  v.setUint16(22,ch,true); v.setUint32(24,sr,true);
  v.setUint32(28,sr*ch*bps/8,true); v.setUint16(32,ch*bps/8,true);
  v.setUint16(34,bps,true); w(36,'data'); v.setUint32(40,dl,true);
  new Uint8Array(buf, 44).set(new Uint8Array(pcm));
  return buf;
}

// ─── WebSocket ────────────────────────────────────────────────────────────
function makeSessionId() {
  const v = $('sessionId').value.trim();
  return v || ('test_' + Math.random().toString(36).slice(2, 11));
}

function connect() {
  const base = $('serverUrl').value.trim().replace(/\/$/, '');
  const sid  = makeSessionId();
  $('sessionId').value = sid;

  setStatus('Connecting…', 's-connecting');
  log(`Connecting → ${base}/ws/voice/${sid}`);
  getAudioCtx(); // warm up on user gesture

  ws = new WebSocket(`${base}/ws/voice/${sid}`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setStatus('Ready — hold mic to speak', 's-ready');
    micBtn.disabled      = false;
    btnConnect.disabled  = true;
    btnDisconnect.disabled = false;
    micHint.textContent  = 'Hold 🎤 while speaking, release when done';
    log(`Connected — session: ${sid}`, 'ok');
    sysMsg(`Session: ${sid}`);
  };

  ws.onmessage = handleMessage;

  ws.onerror = () => {
    setStatus('Connection error', 's-error');
    log('WebSocket error — is the server running?', 'err');
    resetUI();
  };

  ws.onclose = () => {
    setStatus('Disconnected', 's-idle');
    log('WebSocket closed');
    resetUI();
  };
}

function disconnect() {
  stopRecording(false);
  resetAudio(true);
  if (ws) { ws.close(); ws = null; }
}

function handleMessage(event) {
  // Binary = audio chunk
  if (event.data instanceof ArrayBuffer) {
    if (isCancelled) return;
    if (!gotFirstAudio) {
      gotFirstAudio = true;
      t_firstAudio = Date.now();
      const tts = t_firstAudio - t_transcript;
      const total = t_firstAudio - t_eos;
      setLat(lTTS, tts);
      setLat(lTotal, total);
      log(`First audio — TTS: ${ms(tts)}, TTFR: ${ms(total)}`, 'ok');
    }
    enqueueAudio(event.data);
    return;
  }

  // Text = JSON event
  let data;
  try { data = JSON.parse(event.data); } catch { return; }

  if (data.event === 'TRANSCRIPT') {
    if (isCancelled) return;
    t_transcript = Date.now();
    const sttMs = t_transcript - t_eos;
    setLat(lSTT, sttMs);
    log(`Transcript (${ms(sttMs)}): "${data.text}"`, 'inf');
    userMsg(data.text);
    setStatus('Thinking…', 's-thinking');
    gotFirstToken = false;
    gotFirstAudio = false;
    startAgentBubble();
    return;
  }

  if (data.event === 'AGENT_STREAM') {
    if (isCancelled) return;
    if (!gotFirstToken) {
      gotFirstToken = true;
      const llmMs = Date.now() - t_transcript;
      setLat(lLLM, llmMs);
      log(`First LLM token (${ms(llmMs)})`, 'inf');
    }
    appendAgentText(data.text || '');
    return;
  }

  if (data.event === 'TURN_COMPLETE') {
    if (isCancelled) return;
    finalizeAgentBubble();
    setStatus('Ready — hold mic to speak', 's-ready');
    micBtn.disabled    = false;
    btnCancel.disabled = true;
    micHint.textContent = 'Hold 🎤 while speaking, release when done';
    log('Turn complete', 'ok');
    return;
  }

  if (data.event === 'TURN_CANCELLED') {
    isCancelled = false;
    finalizeAgentBubble();
    setStatus('Ready — hold mic to speak', 's-ready');
    micBtn.disabled    = false;
    btnCancel.disabled = true;
    micHint.textContent = 'Hold 🎤 while speaking, release when done';
    log('Turn cancelled', 'inf');
    return;
  }

  if (data.error) {
    log(`Error: ${data.message || data.error}`, 'err');
    setStatus(data.error, 's-error');
    finalizeAgentBubble();
    micBtn.disabled    = false;
    btnCancel.disabled = true;
    sysMsg(`⚠ ${data.message || data.error}`);
    return;
  }
}

// ─── Recording ────────────────────────────────────────────────────────────
async function startRecording() {
  if (isRecording || !ws || ws.readyState !== WebSocket.OPEN) return;
  isCancelled = false;
  gotFirstToken = false;
  gotFirstAudio = false;
  resetLatency();
  resetAudio(false);

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 48000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
  } catch (err) {
    log(`Mic error: ${err.message}`, 'err');
    setStatus('Mic error', 's-error');
    return;
  }

  const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
    ? 'audio/webm;codecs=opus' : 'audio/webm';

  recorder = new MediaRecorder(stream, { mimeType: mime });
  recorder.ondataavailable = e => {
    if (e.data.size > 0 && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(e.data);
    }
  };
  recorder.start(250);
  isRecording = true;

  micBtn.classList.add('active');
  setStatus('Recording… release when done', 's-recording');
  micHint.textContent = 'Release when you finish speaking';
  log('Recording started');
}

function stopRecording(sendEOS = true) {
  if (!isRecording) return;
  isRecording = false;

  // Detach handler BEFORE stop() to prevent the final flush chunk
  // from being sent after END_OF_SPEECH (corrupts next turn).
  if (recorder) recorder.ondataavailable = null;
  if (recorder && recorder.state !== 'inactive') {
    recorder.stop();
    recorder.stream.getTracks().forEach(t => t.stop());
  }
  recorder = null;

  micBtn.classList.remove('active');
  micBtn.disabled = true;

  if (sendEOS && ws && ws.readyState === WebSocket.OPEN) {
    t_eos = Date.now();
    ws.send('END_OF_SPEECH');
    setStatus('Transcribing…', 's-thinking');
    micHint.textContent = 'Processing…';
    btnCancel.disabled = false;
    log('END_OF_SPEECH sent');
  }
}

// ─── UI helpers ───────────────────────────────────────────────────────────
function resetUI() {
  micBtn.disabled        = true;
  btnConnect.disabled    = false;
  btnDisconnect.disabled = true;
  btnCancel.disabled     = true;
  micHint.textContent    = 'Connect first';
}

// ─── Event listeners ──────────────────────────────────────────────────────
btnConnect.addEventListener('click', connect);
btnDisconnect.addEventListener('click', disconnect);

btnCancel.addEventListener('click', () => {
  isCancelled = true;
  stopRecording(false);
  resetAudio(false);
  finalizeAgentBubble();
  if (ws && ws.readyState === WebSocket.OPEN) ws.send('CANCEL_TURN');
  setStatus('Ready — hold mic to speak', 's-ready');
  micBtn.disabled    = false;
  btnCancel.disabled = true;
  micHint.textContent = 'Hold 🎤 while speaking, release when done';
  log('Cancelled');
});

// Desktop mouse
micBtn.addEventListener('mousedown',  e => { e.preventDefault(); startRecording(); });
micBtn.addEventListener('mouseup',    () => stopRecording(true));
micBtn.addEventListener('mouseleave', () => { if (isRecording) stopRecording(true); });

// Mobile touch
micBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); }, { passive: false });
micBtn.addEventListener('touchend',   e => { e.preventDefault(); stopRecording(true); }, { passive: false });
</script>
</body>
</html>
